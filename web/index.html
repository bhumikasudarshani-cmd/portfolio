<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anti-Gravity Immersive Scroll Experience</title>
    <link rel="stylesheet" href="style.css">
    <!-- Load GSAP and ScrollTrigger for premium pinned scroll controls -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>

<body>
    <!-- Animation container which will be pinned by GSAP -->
    <div class="animation-section">
        <canvas id="scroll-canvas"></canvas>
    </div>

    <!-- Blank sections following the scroll animation -->
    <div class="blank-section"></div>
    <div class="blank-section"></div>

    <script src="script.js"></script>
</body>

</html>
